<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vivran.ai — Microphone setup</title>
    <link rel="stylesheet" href="popup.css" />
    <style>
      body { width: auto; max-width: 460px; margin: 60px auto; padding: 0 20px; }
      .card {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 14px;
        padding: 28px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      h1 { font-size: 18px; }
      p { color: #a1a1aa; line-height: 1.55; font-size: 13px; }
      .status { font-weight: 600; font-size: 13px; }
      .ok { color: #34d399; }
      .bad { color: #ef4444; }
    </style>
  </head>
  <body>
    <div class="card">
      <div style="font-size: 34px">🎙️</div>
      <h1>Enable your microphone</h1>
      <p>
        Vivran.ai mixes your microphone with the meeting audio so your own
        voice is part of the transcript. This is a one-time setup — click the
        button and choose <strong>Allow</strong> in the browser prompt.
      </p>
      <button id="grantBtn" class="primary">Enable microphone</button>
      <div id="status" class="status"></div>
    </div>
    <script src="permission.js"></script>
  </body>
</html>
